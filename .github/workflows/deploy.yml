name: "Deploy Backend Service (DynamoDB · Lambda · API Gateway)"

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - 'handler.js'
      - 'db.js'
      - 'provisioners/**'
      - 'package.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: dev
        type: choice
        options: [dev, sit, stage, prod]

env:
  AWS_REGION:   eu-north-1
  PROJECT_NAME: api-portal
  ENVIRONMENT:  ${{ github.event.inputs.environment || 'dev' }}
  TF_VERSION:   '~1.7'
  TF_BACKEND_BUCKET: api-portal-terraform-state
  TF_BACKEND_LOCK_TABLE: api-portal-terraform-locks

jobs:
  deploy:
    name: "[${{ github.event.inputs.environment || 'dev' }}] Backend — DynamoDB · Lambda · API Gateway"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for OIDC authentication

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: api-portal-backend-${{ env.ENVIRONMENT }}
          aws-region:        ${{ env.AWS_REGION }}

      # Install pinned SDK 3.370.0 (avoids Smithy v2 protocol issues with CreateAuthorizer)
      - name: Install dependencies (SDK 3.370.0 pinned)
        run: |
          rm -rf node_modules
          npm install --omit=dev --no-audit --no-fund
          echo "✅ node_modules: $(du -sh node_modules | cut -f1)"

      # Zip root-level Lambda code + node_modules into infrastructure/backend-lambda.zip
      - name: Package backend Lambda zip
        run: |
          zip -r infrastructure/backend-lambda.zip \
            handler.js db.js provisioners/ node_modules/ package.json \
            --exclude "*.DS_Store" --exclude "*.test.js" --exclude "*.zip"
          echo "✅ backend-lambda.zip: $(du -sh infrastructure/backend-lambda.zip | cut -f1)"

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Ensure Terraform backend exists (S3 + DynamoDB)
        run: |
          set -euo pipefail

          echo "Checking S3 bucket: ${{ env.TF_BACKEND_BUCKET }}"
          if aws s3api head-bucket --bucket "${{ env.TF_BACKEND_BUCKET }}" 2>/dev/null; then
            echo "✅ Backend bucket exists"
          else
            echo "⚠️ Backend bucket missing; creating..."
            aws s3api create-bucket \
              --bucket "${{ env.TF_BACKEND_BUCKET }}" \
              --region "${{ env.AWS_REGION }}" \
              --create-bucket-configuration LocationConstraint="${{ env.AWS_REGION }}"

            aws s3api put-bucket-versioning \
              --bucket "${{ env.TF_BACKEND_BUCKET }}" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "${{ env.TF_BACKEND_BUCKET }}" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            aws s3api put-public-access-block \
              --bucket "${{ env.TF_BACKEND_BUCKET }}" \
              --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

            echo "✅ Backend bucket created and hardened"
          fi

          echo "Checking DynamoDB lock table: ${{ env.TF_BACKEND_LOCK_TABLE }}"
          if aws dynamodb describe-table --table-name "${{ env.TF_BACKEND_LOCK_TABLE }}" >/dev/null 2>&1; then
            echo "✅ Lock table exists"
          else
            echo "⚠️ Lock table missing; creating..."
            aws dynamodb create-table \
              --table-name "${{ env.TF_BACKEND_LOCK_TABLE }}" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            echo "Waiting for lock table to become ACTIVE..."
            for i in $(seq 1 24); do
              STATUS=$(aws dynamodb describe-table \
                --table-name "${{ env.TF_BACKEND_LOCK_TABLE }}" \
                --query "Table.TableStatus" --output text 2>/dev/null || echo "NOT_FOUND")
              if [ "$STATUS" = "ACTIVE" ]; then
                echo "✅ Lock table is ACTIVE"
                break
              fi
              echo "  attempt $i/24: status=$STATUS — retrying in 5s..."
              sleep 5
            done
            echo "✅ Lock table created"
          fi

      - name: Resolve upstream Lambda / Authorizer SSM params
        id: ssm
        run: |
          set -euo pipefail
          PREFIX="/api-portal/${{ env.ENVIRONMENT }}"

          read_ssm() {
            aws ssm get-parameter --name "$1" --query "Parameter.Value" --output text 2>/dev/null || echo ""
          }

          LAMBDA_ARN=$(read_ssm "$PREFIX/lambda/arn")
          LAMBDA_FN=$(read_ssm  "$PREFIX/lambda/function-name")
          AUTH_ARN=$(read_ssm   "$PREFIX/authorizer/arn")
          AUTH_FN=$(read_ssm    "$PREFIX/authorizer/function-name")

          echo "lambda_arn=$LAMBDA_ARN"               >> "$GITHUB_OUTPUT"
          echo "lambda_function_name=$LAMBDA_FN"      >> "$GITHUB_OUTPUT"
          echo "authorizer_arn=$AUTH_ARN"             >> "$GITHUB_OUTPUT"
          echo "authorizer_function_name=$AUTH_FN"    >> "$GITHUB_OUTPUT"

          if [ -z "$LAMBDA_ARN" ]; then
            echo "ℹ️  INFO: /lambda/arn SSM param not found."
            echo "   Terraform will fall back to the gui-lambda's own ARN for"
            echo "   EXISTING_LAMBDA_ARN and EXISTING_LAMBDA_FUNCTION_NAME."
            echo "   http-public, http-jwt, http-iam, rest-usage-plan will all work correctly."
          else
            echo "✅ Upstream Lambda ARN:      $LAMBDA_ARN"
          fi

          if [ -z "$AUTH_ARN" ]; then
            echo "⚠️  WARNING: /authorizer/arn SSM param not found."
            echo "   EXISTING_AUTHORIZER_LAMBDA_ARN will be empty on the GUI Lambda."
            echo "   Only http-custom-key provisioner will be affected — all other types work fine."
          else
            echo "✅ Upstream Authorizer ARN:  $AUTH_ARN"
          fi

      - name: Terraform Init
        working-directory: infrastructure
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_BACKEND_LOCK_TABLE }}" \
            -backend-config="key=${{ env.PROJECT_NAME }}/backend/${{ env.ENVIRONMENT }}/terraform.tfstate"

      - name: Terraform Validate
        working-directory: infrastructure
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure
        run: |
          terraform plan \
            -var-file="envs/${{ env.ENVIRONMENT }}.tfvars" \
            -var="existing_lambda_arn=${{ steps.ssm.outputs.lambda_arn }}" \
            -var="existing_lambda_function_name=${{ steps.ssm.outputs.lambda_function_name }}" \
            -var="existing_authorizer_arn=${{ steps.ssm.outputs.authorizer_arn }}" \
            -var="existing_authorizer_function_name=${{ steps.ssm.outputs.authorizer_function_name }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infrastructure
        run: terraform apply -auto-approve tfplan

      - name: Show outputs
        working-directory: infrastructure
        run: |
          echo ""
          echo "══════════════════════════════════════════════"
          echo "  ✅ BACKEND DEPLOYED  |  env=${{ env.ENVIRONMENT }}"
          echo "══════════════════════════════════════════════"
          terraform output backend_api_url
          terraform output gui_lambda_name
          terraform output dynamodb_table
          echo "══════════════════════════════════════════════"
          echo "  ▶ Next: trigger api-portal-frontend deploy"
          echo "══════════════════════════════════════════════"
